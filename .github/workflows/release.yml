name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm packs and delegates the registry upload to `npm publish`, which needs
      # npm >= 11.5.1 to perform the OIDC trusted-publishing token exchange.
      # (pnpm 10 handles --no-git-checks itself and does not leak it to npm; the
      # flag error only occurred with pnpm 9. pnpm 11 breaks OIDC — see pnpm#11513.)
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      # No NPM_TOKEN: auth is via OIDC. changeset publish -> npm publish uses the
      # trusted publisher configured on npmjs.com for this repo + workflow file.
      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
